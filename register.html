<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewLeaf | Register</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>

<body style="overflow: auto;"> <!-- Content is longer, might need scroll on small screens -->

  <div class="auth-wrapper">
    <div class="auth-toggles">
      <button class="icon-btn rtl-toggle" aria-label="Toggle RTL">
        <i class="ph ph-arrows-left-right"></i>
      </button>
      <button class="icon-btn theme-toggle" aria-label="Toggle theme">
        <i class="ph ph-moon"></i>
      </button>
    </div>
    <div class="auth-card">
      <a href="index.html" class="nav-brand">
        <i class="ph ph-leaf"></i>
        NewLeaf
      </a>

      <h2 style="font-size: var(--size-h4); margin-bottom: 24px;">Create an Account</h2>

      <form id="registerForm" action="#" method="POST" novalidate>
        <div class="form-group">
          <label for="regName" class="form-label">Full Name</label>
          <input type="text" id="regName" name="name" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="regEmail" class="form-label">Email Address</label>
          <input type="email" id="regEmail" name="email" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="regPassword" class="form-label">Password (min 8 chars)</label>
          <div class="password-input-wrapper" style="position: relative; width: 100%;">
            <input type="password" id="regPassword" name="password" class="form-control" style="padding-inline-end: 44px; width: 100%;" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility" style="position: absolute; top: 50%; transform: translateY(-50%); inset-inline-end: 12px; background: none; border: none; padding: 4px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
              <i class="ph ph-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="regConfirmPassword" class="form-label">Confirm Password</label>
          <div class="password-input-wrapper" style="position: relative; width: 100%;">
            <input type="password" id="regConfirmPassword" name="confirmPassword" class="form-control" style="padding-inline-end: 44px; width: 100%;" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility" style="position: absolute; top: 50%; transform: translateY(-50%); inset-inline-end: 12px; background: none; border: none; padding: 4px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
              <i class="ph ph-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-check" style="text-align: left;">
          <input type="checkbox" id="regTerms" name="terms" class="form-check-input" required>
          <div>
            <label for="regTerms" class="form-label" style="font-weight: normal; margin-bottom: 0;">I agree to the Terms
              & Conditions and Privacy Policy.</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Register</button>
      </form>

      <div class="divider">or</div>

      <div class="social-btns">
        <button class="btn btn-ghost btn-full">
          <svg viewBox="0 0 24 24" width="18" height="18" style="vertical-align: middle; margin-inline-end: 8px;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg> Continue with Google
        </button>
        <button class="btn btn-ghost btn-full">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="vertical-align: middle; margin-inline-end: 8px;"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-.96.04-2.13.64-2.82 1.45-.6.69-1.12 1.84-.98 2.94.1.08.21.12.33.12.86 0 1.99-.59 2.48-1.45z"/></svg> Continue with Apple
        </button>
      </div>

      <p style="margin-top: 32px; font-size: var(--size-label);">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>

</html>
