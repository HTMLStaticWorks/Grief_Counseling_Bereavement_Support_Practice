<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewLeaf | Page Not Found</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">

  <style>
    @keyframes fall {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(150px) rotate(45deg); opacity: 0; }
    }
    .falling-leaf {
      animation: fall 6s linear infinite;
      color: var(--color-primary);
      font-size: 4rem;
    }
  </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="nav-brand">
        <i class="ph ph-leaf"></i>
        NewLeaf
      </a>
      
      <div class="nav-actions">
        <button class="icon-btn theme-toggle" aria-label="Toggle theme">
          <i class="ph ph-moon"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: calc(var(--spacing-base) * 4); text-align: center;">
    <div>
      <div style="height: 200px; display: flex; justify-content: center; align-items: flex-start; overflow: hidden; margin-bottom: 24px;">
        <i class="ph ph-leaf falling-leaf"></i>
      </div>
      
      <h1 style="font-size: var(--size-h2); margin-bottom: 16px;">404</h1>
      <p class="lead" style="margin-bottom: 32px;">This page seems to have wandered off — let's guide you back.</p>
      
      <a href="index.html" class="btn btn-primary">Return to Home</a>
    </div>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
